<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/themes/prism-okaidia.min.css">
    <link rel="alternate" type="application/rss+xml" title="en RSS Feed" href="/en/rss.xml">
    <title>V Language</title>
    <meta name="author" content="TaMeR">
    <meta name="description" content="Coding in V">
    <meta name="keywords" content="v, vlang, code">
    <style>
        .tag-cloud { line-height: 2.5; padding: 40px; background: white; border-radius: 8px; text-align: center; }
        .tag-item { transition: transform 0.2s; display: inline-block; text-decoration: none; margin: 0 10px; }
        .tag-item:hover { transform: scale(1.1); color: #2196F3 !important; }
        .tag-badge { 
            font-size: 0.6rem; 
            vertical-align: top; 
            background: #e1e1e1; 
            color: #555; 
            padding: 2px 6px; 
            border-radius: 10px; 
            margin-left: 4px; 
        }
    </style>
</head>
<body class="w3-light-grey">
    <div class="w3-bar w3-black w3-card">
        <a href="/en/index.html" class="w3-bar-item w3-button">en Home</a>

        <input type="text" id="si" class="w3-bar-item w3-input w3-right" placeholder="Search..." onkeyup="search()">
        <div id="sr" class="w3-dropdown-content w3-bar-block w3-card-4" style="right:0; top:40px; display:none; position:absolute; z-index:999;"></div>
    </div>
    <div class="w3-content" style="max-width:1400px; margin:20px auto">
        <div class="w3-container w3-white w3-card-4 w3-padding-32">
            <h1>V Language</h1>
            <p><a href="https://vlang.io/">V Language</a>, my new favorite language.<br>
To start with, this website has been created in markdown and converted to html via V.<br>
The code is available at <a href="https://github.com/robotamer/tamer">tamer.pw</a>, look for <code>generator.v</code>.</p>
<p>In addition I am coding on nix. A <a href="https://tamer.pw/v/">module</a> for Linux;
the <a href="https://codeberg.org/tamer/nix">git code</a> can be found at codeberg.org</p>
            
        </div>
    </div>
    
    <script>
    let idx = [];
    async function init() { 
        try {
            const r = await fetch("/en/search.json"); 
            idx = await r.json(); 
        } catch(e) { console.error("Search index failed", e); }
    }
    init();
    function search() {
        const q = document.getElementById("si").value.toLowerCase();
        const r = document.getElementById("sr");
        if (q.length < 2) { r.style.display="none"; return; }
        const m = idx.filter(i => 
            i.t.toLowerCase().includes(q) || 
            (i.g && i.g.toLowerCase().includes(q))
        ).slice(0, 5);
        if (m.length > 0) {
            r.innerHTML = m.map(i => `<a href="${i.u}" class="w3-bar-item w3-button w3-white">${i.t}</a>`).join("");
            r.style.display="block";
        } else { r.style.display="none"; }
    }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/plugins/autoloader/prism-autoloader.min.js"></script>
</body>
</html>
