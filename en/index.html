
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="/w3.css">

    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/en/rss.xml">
    <title>Index</title>
</head>
<body class="w3-light-grey">
    <div class="w3-bar w3-black w3-card">
        
        <input type="text" id="si" class="w3-bar-item w3-input w3-right" placeholder="Search..." onkeyup="search()">
        <div id="sr" class="w3-dropdown-content w3-bar-block w3-card-4" style="right:0; top:40px; display:none; position:absolute; z-index:999;"></div>
    </div>
    <div class="w3-content" style="max-width:1400px; margin:20px auto">
        <div class="w3-container w3-white w3-card-4 w3-padding-32"><h2>Folder: en</h2><ul><li><a href="/en/copyright.html">Copyright</a> <span class="w3-tiny w3-text-grey">(2015-01-28T19:54:59Z)</span></li><li><a href="/en/license.html">Copyright</a> <span class="w3-tiny w3-text-grey">(2015-01-28T19:54:59Z)</span></li><li><a href="/en/pgp.html">PGP</a> <span class="w3-tiny w3-text-grey">(2015-01-28T19:54:59Z)</span></li><li><a href="/en/about.html">About me</a> <span class="w3-tiny w3-text-grey">(2015-01-28T19:54:59Z)</span></li><li><a href="/en/contact.html">Contact</a> <span class="w3-tiny w3-text-grey">(2015-01-28T19:54:59Z)</span></li></ul></div>
    </div>
    <script>
    let idx = [];
    async function init() { const r = await fetch("/en/search.json"); idx = await r.json(); }
    init();
    function search() {
        const q = document.getElementById("si").value.toLowerCase();
        const r = document.getElementById("sr");
        if (q.length < 2) { r.style.display="none"; return; }
        const m = idx.filter(i => i.t.toLowerCase().includes(q)).slice(0, 5);
        if (m.length > 0) {
            r.innerHTML = m.map(i => `<a href="${i.u}" class="w3-bar-item w3-button w3-white">${i.t}</a>`).join("");
            r.style.display="block";
        } else { r.style.display="none"; }
    }
    </script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/prism.min.js"></script>

</html>
