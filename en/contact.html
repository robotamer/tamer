<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/themes/prism-okaidia.min.css">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/en/rss.xml">
    <title>Contact</title>
</head>
<body class="w3-light-grey">
    <div class="w3-bar w3-black w3-card">
        <a href="/en/index.html" class="w3-bar-item w3-button">Home</a><a href="/en/license.html" class="w3-bar-item w3-button">Copyright</a><a href="/en/pgp.html" class="w3-bar-item w3-button">PGP</a><a href="/en/about.html" class="w3-bar-item w3-button">About me</a><a href="/en/index.html" class="w3-bar-item w3-button">Random toughts</a><a href="/en/blog/index.html" class="w3-bar-item w3-button w3-blue">📁 blog</a><a href="/en/linux/index.html" class="w3-bar-item w3-button w3-blue">📁 linux</a><a href="/en/code/index.html" class="w3-bar-item w3-button w3-blue">📁 code</a>
        <input type="text" id="si" class="w3-bar-item w3-input w3-right" placeholder="Search..." onkeyup="search()">
        <div id="sr" class="w3-dropdown-content w3-bar-block w3-card-4" style="right:0; top:40px; display:none; position:absolute; z-index:999;"></div>
    </div>
    <div class="w3-content" style="max-width:1400px; margin:20px auto">
        <div class="w3-container w3-white w3-card-4 w3-padding-32"><h1>Contact</h1><div class="w3-justify"><p>My <a href="/en/pgp.html">PGP</a> key</p></div><hr><p class="w3-small w3-text-grey">Last Modified: 2015-01-28T19:54:59Z</p></div>
    </div>
    <script>
    let idx = [];
    async function init() { const r = await fetch("/en/search.json"); idx = await r.json(); }
    init();
    function search() {
        const q = document.getElementById("si").value.toLowerCase();
        const r = document.getElementById("sr");
        if (q.length < 2) { r.style.display="none"; return; }
        const m = idx.filter(i => i.t.toLowerCase().includes(q)).slice(0, 5);
        if (m.length > 0) {
            r.innerHTML = m.map(i => `<a href="${i.u}" class="w3-bar-item w3-button w3-white">${i.t}</a>`).join("");
            r.style.display="block";
        } else { r.style.display="none"; }
    }
    </script>

	<!-- Prism.js Core -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/prism.min.js"></script>
	<!-- Autoloader: Automatically loads languages  -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.22.0/plugins/autoloader/prism-autoloader.min.js"></script>
</body>
</html>
